<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" shape-rendering="crispEdges" role="img" aria-label="orange pixel-art nyan-style cat floating without background">
  <g>
    <animateTransform attributeName="transform" type="translate"
                      values="0,0; 0,-4; 0,0"
                      calcMode="spline"
                      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
                      keyTimes="0;0.5;1" dur="2.2s" repeatCount="indefinite"/>
    <!-- tail flowing back -->
    <rect x="10" y="22" width="14" height="10" fill="#e89b5a"/>
    <rect x="14" y="14" width="10" height="14" fill="#e89b5a"/>
    <rect x="14" y="10" width="22" height="10" fill="#e89b5a"/>
    <rect x="28" y="8"  width="20" height="8"  fill="#c27a3a"/>
    <rect x="34" y="28" width="22" height="8"  fill="#e89b5a"/>
    <!-- sparkle dots (optional decorative pixels) -->
    <rect x="10" y="10" width="4" height="4" fill="#ffd700"/>
    <rect x="26" y="4"  width="4" height="4" fill="#ffd700"/>
    <rect x="6"  y="38" width="4" height="4" fill="#ffd700"/>
    <rect x="30" y="52" width="4" height="4" fill="#ffd700">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="8" y="56" width="4" height="4" fill="#ffd700">
      <animate attributeName="opacity" values="0;1;0" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <!-- main body (rounder, more nyan-like) -->
    <rect x="50" y="22" width="170" height="40" fill="#e89b5a"/>
    <rect x="44" y="28" width="12"  height="28" fill="#e89b5a"/>
    <rect x="58" y="30" width="150" height="26" fill="#f4b078"/>
    <rect x="215" y="24" width="16" height="34" fill="#e89b5a"/>
    <!-- stripes on body -->
    <rect x="68"  y="22" width="8" height="26" fill="#c27a3a"/>
    <rect x="98"  y="22" width="8" height="30" fill="#c27a3a"/>
    <rect x="130" y="22" width="8" height="26" fill="#c27a3a"/>
    <rect x="162" y="22" width="8" height="20" fill="#c27a3a"/>
    <!-- head -->
    <rect x="224" y="8"  width="72" height="56" fill="#e89b5a"/>
    <rect x="284" y="26" width="24" height="32" fill="#f4b078"/>
    <!-- ears -->
    <rect x="228" y="0"  width="20" height="16" fill="#e89b5a"/>
    <rect x="230" y="2"  width="14" height="11" fill="#f4b078"/>
    <rect x="254" y="0"  width="20" height="16" fill="#e89b5a"/>
    <rect x="256" y="2"  width="14" height="11" fill="#f4b078"/>
    <!-- eye white -->
    <rect x="264" y="18" width="18" height="16" fill="#fafafa"/>
    <!-- iris with blink -->
    <rect x="264" y="18" width="18" height="16" fill="#3a7c3a">
      <animate attributeName="height" values="16;16;16;0;16" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1" keyTimes="0;0.82;0.9;0.93;1" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="y" values="18;18;18;26;18" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1" keyTimes="0;0.82;0.9;0.93;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="267" y="20" width="8" height="12" fill="#1a1a1a">
      <animate attributeName="height" values="12;12;12;0;12" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1" keyTimes="0;0.82;0.9;0.93;1" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="y" values="20;20;20;26;20" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1" keyTimes="0;0.82;0.9;0.93;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="265" y="19" width="6" height="5" fill="#fafafa"/>
    <!-- nose -->
    <rect x="292" y="38" width="9" height="7" fill="#c06060"/>
    <!-- mouth -->
    <rect x="288" y="48" width="8" height="5" fill="#6b3a1a"/>
    <rect x="298" y="48" width="8" height="5" fill="#6b3a1a"/>
    <!-- whiskers -->
    <g stroke="#6b3a1a" stroke-width="1.5" stroke-linecap="square" fill="none">
      <line x1="294" y1="40" x2="318" y2="36"/>
      <line x1="294" y1="44" x2="318" y2="48"/>
    </g>
    <!-- floating legs (dangling slightly) -->
    <rect x="74"  y="60" width="14" height="18" fill="#e89b5a">
      <animate attributeName="y" values="60;64;60" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" keyTimes="0;0.5;1" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="100" y="62" width="14" height="18" fill="#c27a3a">
      <animate attributeName="y" values="62;58;62" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" keyTimes="0;0.5;1" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="178" y="62" width="14" height="18" fill="#c27a3a">
      <animate attributeName="y" values="62;58;62" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" keyTimes="0;0.5;1" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="204" y="60" width="14" height="18" fill="#e89b5a">
      <animate attributeName="y" values="60;64;60" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" keyTimes="0;0.5;1" dur="2.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
