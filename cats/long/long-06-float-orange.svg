<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 88" width="300" height="88" role="img" aria-label="orange cat floating with sparkles">
<style>
.g{animation:float 2s ease-in-out infinite}
.ld{animation:dangle 2s ease-in-out infinite}
.tw{animation:wag 2s ease-in-out infinite;transform-box:fill-box;transform-origin:90% 85%}
.bl{animation:bl 4s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 50%}
.sp{animation:sparkle 1.4s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 50%}
.sp2{animation:sparkle 1.4s ease-in-out infinite .7s;transform-box:fill-box;transform-origin:50% 50%}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes dangle{0%,100%{transform:translateY(4px)}50%{transform:translateY(-4px)}}
@keyframes wag{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(20deg)}}
@keyframes bl{0%,87%,100%{transform:scaleY(1)}91%{transform:scaleY(.05)}}
@keyframes sparkle{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(.3);opacity:.2}}
</style>
<g class="g">
  <!-- sparkles -->
  <g class="sp"><circle cx="18" cy="18" r="4" fill="#ffd700"/><circle cx="18" cy="14" r="1.5" fill="#ffd700"/><circle cx="18" cy="22" r="1.5" fill="#ffd700"/><circle cx="14" cy="18" r="1.5" fill="#ffd700"/><circle cx="22" cy="18" r="1.5" fill="#ffd700"/></g>
  <g class="sp2"><circle cx="36" cy="8" r="3.5" fill="#ffd700"/><circle cx="36" cy="5" r="1.2" fill="#ffd700"/><circle cx="36" cy="11" r="1.2" fill="#ffd700"/><circle cx="33" cy="8" r="1.2" fill="#ffd700"/><circle cx="39" cy="8" r="1.2" fill="#ffd700"/></g>
  <g class="sp"><circle cx="12" cy="46" r="3" fill="#ffee70"/></g>
  <g class="sp2"><circle cx="28" cy="60" r="2.5" fill="#ffd700"/></g>
  <g class="tw">
    <path d="M57,53 Q40,45 30,30 Q20,16 28,11 Q36,7 40,19 Q44,31 57,49"
          stroke="#f0a020" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M57,53 Q40,45 30,30 Q20,16 28,11 Q36,7 40,19 Q44,31 57,49"
          stroke="#c07a10" stroke-width="5" fill="none" stroke-linecap="round" opacity=".4"/>
  </g>
  <!-- dangling legs -->
  <rect class="ld" x="78" y="66" width="14" height="18" rx="7" fill="#c07a10"/>
  <rect class="ld" x="96" y="68" width="14" height="18" rx="7" fill="#d08818"/>
  <ellipse cx="148" cy="56" rx="94" ry="22" fill="#f0a020"/>
  <ellipse cx="148" cy="65" rx="68" ry="12" fill="#c07a10" opacity=".25"/>
  <path d="M90,36 C91,49 91,61 90,71" stroke="#c07a10" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M120,34 C121,49 121,63 120,73" stroke="#c07a10" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M150,34 C151,49 151,63 150,73" stroke="#c07a10" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <rect class="ld" x="188" y="66" width="14" height="18" rx="7" fill="#f0a020"/>
  <rect class="ld" x="206" y="68" width="14" height="18" rx="7" fill="#e09018"/>
  <ellipse cx="226" cy="50" rx="16" ry="20" fill="#f0a020"/>
  <polygon points="238,32 244,11 261,29" fill="#f0a020"/>
  <polygon points="240,31 246,17 259,29" fill="#ffbe80"/>
  <polygon points="255,29 261,12 272,28" fill="#f0a020"/>
  <polygon points="257,29 262,18 270,28" fill="#ffbe80"/>
  <circle cx="259" cy="35" r="28" fill="#f0a020"/>
  <ellipse cx="276" cy="42" rx="14" ry="11" fill="#ffc060"/>
  <circle cx="250" cy="26" r="10" fill="white"/>
  <circle cx="250" cy="26" r="6.5" fill="#3a8c3a" class="bl"/>
  <circle cx="250" cy="26" r="3" fill="#111" class="bl"/>
  <circle cx="247" cy="23" r="1.8" fill="white"/>
  <ellipse cx="274" cy="39" rx="4" ry="3" fill="#e07880"/>
  <path d="M271,41 Q268,45 266,44" stroke="#b04040" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M277,41 Q280,45 282,44" stroke="#b04040" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <line x1="265" y1="40" x2="298" y2="36" stroke="#c07a10" stroke-width="1.2" stroke-linecap="round" opacity=".7"/>
  <line x1="265" y1="43" x2="298" y2="43" stroke="#c07a10" stroke-width="1.2" stroke-linecap="round" opacity=".7"/>
</g>
</svg>
