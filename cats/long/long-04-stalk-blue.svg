<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 68" width="300" height="68" role="img" aria-label="blue-gray cat stalking low">
<style>
.g{animation:bob 1.4s ease-in-out infinite}
.la{animation:la 1.4s ease-in-out infinite}
.lb{animation:lb 1.4s ease-in-out infinite}
.tw{animation:wag 2.8s ease-in-out infinite;transform-box:fill-box;transform-origin:90% 80%}
.bl{animation:bl 5s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 50%}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-1px)}}
@keyframes la{0%,100%{transform:translateY(-4px)}50%{transform:translateY(0)}}
@keyframes lb{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes wag{0%,100%{transform:rotate(0deg)}50%{transform:rotate(10deg)}}
@keyframes bl{0%,87%,100%{transform:scaleY(1)}91%{transform:scaleY(.05)}}
</style>
