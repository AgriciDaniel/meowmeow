<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80" role="img" aria-label="ginger cat running">
<style>
.g{animation:bob .4s ease-in-out infinite}
.la{animation:la .4s ease-in-out infinite}
.lb{animation:lb .4s ease-in-out infinite}
.tw{animation:wag .9s ease-in-out infinite;transform-box:fill-box;transform-origin:90% 85%}
.bl{animation:bl 3s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 50%}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes la{0%,100%{transform:translateY(-9px)}50%{transform:translateY(0)}}
@keyframes lb{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes wag{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(28deg)}}
@keyframes bl{0%,87%,100%{transform:scaleY(1)}91%{transform:scaleY(.05)}}
</style>
