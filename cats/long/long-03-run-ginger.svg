<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" shape-rendering="crispEdges" role="img" aria-label="ginger pixel-art cat running fast">
  <g>
    <animateTransform attributeName="transform" type="translate"
                      values="0,0; 0,-2; 0,0; 0,-2; 0,0"
                      calcMode="spline"
                      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"
                      keyTimes="0;0.25;0.5;0.75;1" dur="0.45s" repeatCount="indefinite"/>
    <!-- tail raised (running = tail up) -->
    <rect x="18" y="10" width="10" height="30" fill="#f0a030"/>
    <rect x="18" y="6"  width="24" height="10" fill="#f0a030"/>
    <rect x="32" y="4"  width="12" height="8"  fill="#c07818"/>
    <rect x="36" y="28" width="20" height="10" fill="#f0a030"/>
    <!-- body (slightly crouched/elongated for running) -->
    <rect x="50" y="30" width="170" height="30" fill="#f0a030"/>
    <rect x="44" y="34" width="12"  height="22" fill="#f0a030"/>
    <rect x="62" y="40" width="144" height="16" fill="#ffc060"/>
    <rect x="214" y="30" width="18" height="25" fill="#f0a030"/>
    <!-- stripes -->
    <rect x="70"  y="30" width="8" height="18" fill="#c07818"/>
    <rect x="100" y="30" width="8" height="22" fill="#c07818"/>
    <rect x="132" y="30" width="8" height="18" fill="#c07818"/>
    <rect x="162" y="30" width="8" height="12" fill="#c07818"/>
    <!-- head (more forward/horizontal for running) -->
    <rect x="224" y="14" width="68" height="50" fill="#f0a030"/>
    <rect x="280" y="32" width="22" height="26" fill="#ffc060"/>
    <!-- ears -->
    <rect x="228" y="4"  width="18" height="14" fill="#f0a030"/>
    <rect x="230" y="6"  width="12" height="9"  fill="#ffc060"/>
    <rect x="250" y="4"  width="18" height="14" fill="#f0a030"/>
    <rect x="252" y="6"  width="12" height="9"  fill="#ffc060"/>
    <!-- eye -->
    <rect x="261" y="22" width="16" height="14" fill="#fafafa"/>
    <rect x="261" y="22" width="16" height="14" fill="#3a9c3a">
      <animate attributeName="height" values="14;14;14;0;14" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1" keyTimes="0;0.82;0.9;0.93;1" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="22;22;22;29;22" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1" keyTimes="0;0.82;0.9;0.93;1" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="264" y="24" width="7" height="10" fill="#1a1a1a">
      <animate attributeName="height" values="10;10;10;0;10" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1" keyTimes="0;0.82;0.9;0.93;1" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="24;24;24;29;24" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1" keyTimes="0;0.82;0.9;0.93;1" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="262" y="23" width="5" height="4" fill="#fafafa"/>
    <rect x="286" y="40" width="8" height="6" fill="#c85050"/>
    <rect x="282" y="48" width="7" height="4" fill="#804018"/>
    <rect x="290" y="48" width="7" height="4" fill="#804018"/>
    <g stroke="#804018" stroke-width="1.5" stroke-linecap="square" fill="none">
      <line x1="288" y1="42" x2="312" y2="38"/>
      <line x1="288" y1="46" x2="312" y2="50"/>
    </g>
    <!-- running legs: more spread, alternating fast -->
    <rect x="60" y="58" width="15" height="18" fill="#f0a030">
      <animate attributeName="y" values="58;50;58" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" keyTimes="0;0.5;1" dur="0.45s" repeatCount="indefinite"/>
    </rect>
    <rect x="92" y="50" width="15" height="18" fill="#c07818">
      <animate attributeName="y" values="50;58;50" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" keyTimes="0;0.5;1" dur="0.45s" repeatCount="indefinite"/>
    </rect>
    <rect x="178" y="50" width="15" height="18" fill="#c07818">
      <animate attributeName="y" values="50;58;50" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" keyTimes="0;0.5;1" dur="0.45s" repeatCount="indefinite"/>
    </rect>
    <rect x="210" y="58" width="15" height="18" fill="#f0a030">
      <animate attributeName="y" values="58;50;58" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" keyTimes="0;0.5;1" dur="0.45s" repeatCount="indefinite"/>
    </rect>
    <rect x="60" y="70" width="15" height="6" fill="#c07818">
      <animate attributeName="y" values="70;62;70" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" keyTimes="0;0.5;1" dur="0.45s" repeatCount="indefinite"/>
    </rect>
    <rect x="92" y="62" width="15" height="6" fill="#c07818">
      <animate attributeName="y" values="62;70;62" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" keyTimes="0;0.5;1" dur="0.45s" repeatCount="indefinite"/>
    </rect>
    <rect x="178" y="62" width="15" height="6" fill="#c07818">
      <animate attributeName="y" values="62;70;62" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" keyTimes="0;0.5;1" dur="0.45s" repeatCount="indefinite"/>
    </rect>
    <rect x="210" y="70" width="15" height="6" fill="#c07818">
      <animate attributeName="y" values="70;62;70" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" keyTimes="0;0.5;1" dur="0.45s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
