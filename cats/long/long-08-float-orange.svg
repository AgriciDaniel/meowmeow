<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 82" width="160" height="82"
     role="img" aria-label="orange cat floating with sparkles">
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-6; 0,0" dur="2s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1"
      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>

    <!-- sparkles -->
    <circle cx="18" cy="22" r="3.5" fill="#ffd700">
      <animate attributeName="r" values="3.5;1;3.5" dur="1.4s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1"
               keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      <animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1"
               keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </circle>
    <circle cx="34" cy="10" r="2.5" fill="#ffd700">
      <animate attributeName="r" values="1;2.5;1" dur="1.4s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1"
               keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.4s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1"
               keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </circle>
    <circle cx="10" cy="50" r="2" fill="#ffee70">
      <animate attributeName="opacity" values="1;0.1;1" dur="2s" begin="0.3s"
               repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1"
               keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </circle>

    <!-- tail floating up/back -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="-5 32 48; 10 32 48; -5 32 48" dur="2s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      <path d="M32,48 Q18,38 14,22 Q10,8 18,6 Q26,4 26,18 Q26,32 33,46"
            stroke="#f0a020" stroke-width="10" fill="none" stroke-linecap="round"/>
      <path d="M32,48 Q18,38 14,22 Q10,8 18,6 Q26,4 26,18 Q26,32 33,46"
            stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.35"/>
    </g>

    <!-- dangling legs (slight opposite float) -->
    <rect x="44" y="62" width="10" height="14" rx="5" fill="#c07a10">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,3; 0,0" dur="2s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </rect>
    <rect x="58" y="64" width="10" height="14" rx="5" fill="#d08818">
      <animateTransform attributeName="transform" type="translate"
        values="0,2; 0,-1; 0,2" dur="2s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </rect>

    <ellipse cx="80" cy="50" rx="52" ry="18" fill="#f0a020"/>
    <ellipse cx="80" cy="57" rx="38" ry="10" fill="#c07a10" opacity="0.22"/>
    <path d="M50,34 C51,45 51,57 50,66" stroke="#c07a10" stroke-width="2.5"
          fill="none" stroke-linecap="round"/>
    <path d="M68,32 C69,45 69,59 68,68" stroke="#c07a10" stroke-width="2.5"
          fill="none" stroke-linecap="round"/>
    <path d="M86,32 C87,45 87,59 86,68" stroke="#c07a10" stroke-width="2.5"
          fill="none" stroke-linecap="round"/>

    <rect x="104" y="62" width="10" height="14" rx="5" fill="#c07a10">
      <animateTransform attributeName="transform" type="translate"
        values="0,2; 0,-1; 0,2" dur="2s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </rect>
    <rect x="118" y="64" width="10" height="14" rx="5" fill="#d08818">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,3; 0,0" dur="2s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </rect>

    <ellipse cx="122" cy="44" rx="10" ry="14" fill="#f0a020"/>
    <polygon points="118,28 122,10 136,26" fill="#f0a020"/>
    <polygon points="120,27 123,15 134,26" fill="#ffa880"/>
    <polygon points="132,26 136,11 146,26" fill="#f0a020"/>
    <polygon points="133,26 137,16 144,26" fill="#ffa880"/>
    <circle cx="136" cy="30" r="20" fill="#f0a020"/>
    <ellipse cx="148" cy="36" rx="9" ry="7" fill="#ffc060"/>
    <circle cx="130" cy="24" r="8" fill="white"/>
    <ellipse cx="130" cy="24" rx="5.5" ry="5.5" fill="#3a8c3a">
      <animate attributeName="ry" values="5.5;5.5;5.5;0.3;5.5"
               keyTimes="0;0.82;0.9;0.93;1" calcMode="spline"
               keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1"
               dur="4s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="130" cy="24" rx="2" ry="4" fill="#111">
      <animate attributeName="ry" values="4;4;4;0.2;4"
               keyTimes="0;0.82;0.9;0.93;1" calcMode="spline"
               keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1"
               dur="4s" repeatCount="indefinite"/>
    </ellipse>
    <circle cx="127" cy="21" r="1.5" fill="white"/>
    <ellipse cx="147" cy="34" rx="2.5" ry="2" fill="#e07880"/>
    <path d="M145,36 Q143,39 141,38" stroke="#b05050" stroke-width="1.2"
          fill="none" stroke-linecap="round"/>
    <path d="M149,36 Q151,39 153,38" stroke="#b05050" stroke-width="1.2"
          fill="none" stroke-linecap="round"/>
    <line x1="142" y1="34" x2="159" y2="31" stroke="#c07a10" stroke-width="1"
          stroke-linecap="round" opacity="0.7"/>
    <line x1="142" y1="36" x2="159" y2="37" stroke="#c07a10" stroke-width="1"
          stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
