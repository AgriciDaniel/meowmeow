<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 80" width="140" height="80"
     role="img" aria-label="cream loaf cat sitting">
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-2; 0,0" dur="4s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.5;1"
      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>

    <!-- tail swaying at side -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="-5 22 58; 5 22 58; -5 22 58" dur="3s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      <path d="M22,58 Q10,48 12,36 Q14,26 20,28 Q26,30 24,40 Q22,50 24,56"
            stroke="#eedaa8" stroke-width="9" fill="none" stroke-linecap="round"/>
      <path d="M22,58 Q10,48 12,36 Q14,26 20,28 Q26,30 24,40 Q22,50 24,56"
            stroke="#b89862" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.35"/>
    </g>

    <!-- loaf body (layered for roundness) -->
    <ellipse cx="72" cy="60" rx="50" ry="18" fill="#eedaa8"/>
    <ellipse cx="72" cy="54" rx="42" ry="16" fill="#eedaa8"/>
    <ellipse cx="72" cy="48" rx="32" ry="12" fill="#eedaa8"/>
    <ellipse cx="72" cy="64" rx="40" ry="12" fill="#f7e8c2"/>

    <!-- stripes on body -->
    <path d="M46,38 C47,50 47,62 46,72" stroke="#b89862" stroke-width="2.5"
          fill="none" stroke-linecap="round"/>
    <path d="M64,36 C65,50 65,64 64,74" stroke="#b89862" stroke-width="2.5"
          fill="none" stroke-linecap="round"/>

    <!-- tiny paw stubs -->
    <ellipse cx="38" cy="76" rx="10" ry="5" fill="#eedaa8"/>
    <ellipse cx="60" cy="77" rx="10" ry="4" fill="#f7e8c2"/>

    <!-- neck -->
    <ellipse cx="100" cy="52" rx="10" ry="14" fill="#eedaa8"/>

    <!-- ears -->
    <polygon points="96,38 100,20 114,36" fill="#eedaa8"/>
    <polygon points="98,37 101,25 112,36" fill="#f7c8a0"/>
    <polygon points="110,36 114,21 124,36" fill="#eedaa8"/>
    <polygon points="111,36 115,26 122,36" fill="#f7c8a0"/>

    <!-- head -->
    <circle cx="114" cy="42" r="20" fill="#eedaa8"/>

    <!-- snout -->
    <ellipse cx="126" cy="48" rx="9" ry="7" fill="#f7e8c2"/>

    <!-- eye -->
    <circle cx="108" cy="36" r="8" fill="white"/>
    <ellipse cx="108" cy="36" rx="5.5" ry="5.5" fill="#c89b3a">
      <animate attributeName="ry" values="5.5;5.5;5.5;0.3;5.5"
               keyTimes="0;0.82;0.9;0.93;1" calcMode="spline"
               keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1"
               dur="5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="108" cy="36" rx="2" ry="4" fill="#111">
      <animate attributeName="ry" values="4;4;4;0.2;4"
               keyTimes="0;0.82;0.9;0.93;1" calcMode="spline"
               keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1"
               dur="5s" repeatCount="indefinite"/>
    </ellipse>
    <circle cx="105" cy="33" r="1.5" fill="white"/>

    <ellipse cx="125" cy="46" rx="2.5" ry="2" fill="#d07080"/>
    <path d="M123,48 Q121,51 119,50" stroke="#906040" stroke-width="1.2"
          fill="none" stroke-linecap="round"/>
    <path d="M127,48 Q129,51 131,50" stroke="#906040" stroke-width="1.2"
          fill="none" stroke-linecap="round"/>
    <line x1="120" y1="46" x2="138" y2="43" stroke="#b89862" stroke-width="1"
          stroke-linecap="round" opacity="0.7"/>
    <line x1="120" y1="48" x2="138" y2="49" stroke="#b89862" stroke-width="1"
          stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
