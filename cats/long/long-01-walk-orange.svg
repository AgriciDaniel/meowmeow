  <circle cx="250" cy="22" r="10" fill="white"/>
  <circle cx="250" cy="22" r="6.5" fill="#3a8c3a" class="bl"/>
  <circle cx="250" cy="22" r="3" fill="#111" class="bl"/>
  <circle cx="247" cy="19" r="1.8" fill="white"/>
  <ellipse cx="274" cy="35" rx="4" ry="3" fill="#e07880"/>
  <path d="M271,37 Q268,41 266,40" stroke="#b04040" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M277,37 Q280,41 282,40" stroke="#b04040" stroke-width="1.5" fill="none" stroke-linecap="round"/>
