<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 72" width="160" height="72"
     role="img" aria-label="orange tabby cat walking">
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-2; 0,0; 0,-2; 0,0" dur="0.6s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.25;0.5;0.75;1"
      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"/>

    <!-- tail -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="0 32 44; 14 32 44; 0 32 44" dur="1.8s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;0.5;1"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
      <path d="M32,44 Q18,36 12,22 Q7,10 14,7 Q21,4 23,16 Q25,28 33,42"
            stroke="#f0a020" stroke-width="10" fill="none" stroke-linecap="round"/>
      <path d="M32,44 Q18,36 12,22 Q7,10 14,7 Q21,4 23,16 Q25,28 33,42"
            stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.35"/>
    </g>

    <!-- back legs -->
    <rect x="44" y="58" width="10" height="13" rx="5" fill="#c07a10">
      <animate attributeName="y" values="58;52;58" dur="0.6s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1"
               keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </rect>
    <rect x="56" y="52" width="10" height="13" rx="5" fill="#d08818">
      <animate attributeName="y" values="52;58;52" dur="0.6s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1"
               keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </rect>

    <!-- body -->
    <ellipse cx="80" cy="46" rx="52" ry="18" fill="#f0a020"/>
    <ellipse cx="80" cy="53" rx="38" ry="10" fill="#c07a10" opacity="0.22"/>

    <!-- stripes -->
    <path d="M50,30 C51,41 51,53 50,62" stroke="#c07a10" stroke-width="2.5"
          fill="none" stroke-linecap="round"/>
    <path d="M68,28 C69,41 69,55 68,64" stroke="#c07a10" stroke-width="2.5"
          fill="none" stroke-linecap="round"/>
    <path d="M86,28 C87,41 87,55 86,64" stroke="#c07a10" stroke-width="2.5"
          fill="none" stroke-linecap="round"/>

    <!-- front legs -->
    <rect x="104" y="52" width="10" height="13" rx="5" fill="#c07a10">
      <animate attributeName="y" values="52;58;52" dur="0.6s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1"
               keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </rect>
    <rect x="116" y="58" width="10" height="13" rx="5" fill="#d08818">
      <animate attributeName="y" values="58;52;58" dur="0.6s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1"
               keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
    </rect>

    <!-- neck -->
    <ellipse cx="122" cy="40" rx="10" ry="14" fill="#f0a020"/>

    <!-- ears (drawn before head so circle covers bases) -->
    <polygon points="118,24 122,6 136,22" fill="#f0a020"/>
    <polygon points="120,23 123,11 134,22" fill="#ffa880"/>
    <polygon points="132,22 136,7 146,22" fill="#f0a020"/>
    <polygon points="133,22 137,12 144,22" fill="#ffa880"/>

    <!-- head -->
    <circle cx="136" cy="26" r="20" fill="#f0a020"/>

    <!-- snout -->
    <ellipse cx="148" cy="32" rx="9" ry="7" fill="#ffc060"/>

    <!-- eye -->
    <circle cx="130" cy="20" r="8" fill="white"/>
    <ellipse cx="130" cy="20" rx="5.5" ry="5.5" fill="#3a8c3a">
      <animate attributeName="ry" values="5.5;5.5;5.5;0.3;5.5"
               keyTimes="0;0.82;0.9;0.93;1" calcMode="spline"
               keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1"
               dur="4s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="130" cy="20" rx="2" ry="4" fill="#111">
      <animate attributeName="ry" values="4;4;4;0.2;4"
               keyTimes="0;0.82;0.9;0.93;1" calcMode="spline"
               keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1"
               dur="4s" repeatCount="indefinite"/>
    </ellipse>
    <circle cx="127" cy="17" r="1.5" fill="white"/>

    <!-- nose + mouth -->
    <ellipse cx="147" cy="30" rx="2.5" ry="2" fill="#e07880"/>
    <path d="M145,32 Q143,35 141,34" stroke="#b05050" stroke-width="1.2"
          fill="none" stroke-linecap="round"/>
    <path d="M149,32 Q151,35 153,34" stroke="#b05050" stroke-width="1.2"
          fill="none" stroke-linecap="round"/>

    <!-- whiskers -->
    <line x1="142" y1="30" x2="159" y2="27" stroke="#c07a10" stroke-width="1"
          stroke-linecap="round" opacity="0.7"/>
    <line x1="142" y1="32" x2="159" y2="33" stroke="#c07a10" stroke-width="1"
          stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
