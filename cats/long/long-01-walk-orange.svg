  <path d="M120,30 C121,45 121,59 120,69" stroke="#c07a10" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M150,30 C151,45 151,59 150,69" stroke="#c07a10" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <rect class="la" x="188" y="63" width="14" height="16" rx="7" fill="#f0a020"/>
  <rect class="lb" x="206" y="63" width="14" height="16" rx="7" fill="#e09018"/>
