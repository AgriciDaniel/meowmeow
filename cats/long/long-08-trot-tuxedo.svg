<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80" role="img" aria-label="tuxedo cat trotting">
<style>
.g{animation:bob .55s ease-in-out infinite}
.la{animation:la .55s ease-in-out infinite}
.lb{animation:lb .55s ease-in-out infinite}
.tw{animation:wag 1.6s ease-in-out infinite;transform-box:fill-box;transform-origin:90% 85%}
.bl{animation:bl 4s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 50%}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes la{0%,100%{transform:translateY(-7px)}50%{transform:translateY(0)}}
@keyframes lb{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes wag{0%,100%{transform:rotate(0deg)}50%{transform:rotate(22deg)}}
@keyframes bl{0%,87%,100%{transform:scaleY(1)}91%{transform:scaleY(.05)}}
</style>
<g class="g">
  <g class="tw">
    <path d="M57,49 Q40,41 30,26 Q20,12 28,7 Q36,3 40,15 Q44,27 57,45"
          stroke="#606060" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M57,49 Q40,41 30,26 Q20,12 28,7 Q36,3 40,15 Q44,27 57,45"
          stroke="#404040" stroke-width="5" fill="none" stroke-linecap="round" opacity=".4"/>
  </g>
  <rect class="lb" x="78" y="63" width="14" height="16" rx="7" fill="#404040"/>
  <rect class="la" x="96" y="63" width="14" height="16" rx="7" fill="#555"/>
  <ellipse cx="148" cy="52" rx="94" ry="22" fill="#606060"/>
  <!-- white chest / tuxedo -->
  <ellipse cx="148" cy="60" rx="62" ry="14" fill="#f0f0f0"/>
  <rect class="la" x="188" y="63" width="14" height="16" rx="7" fill="#f0f0f0"/>
  <rect class="lb" x="206" y="63" width="14" height="16" rx="7" fill="#e0e0e0"/>
  <ellipse cx="226" cy="46" rx="16" ry="20" fill="#606060"/>
  <polygon points="238,28 244,7 261,25" fill="#606060"/>
  <polygon points="240,27 246,13 259,25" fill="#c09090"/>
  <polygon points="255,25 261,8 272,24" fill="#606060"/>
  <polygon points="257,25 262,14 270,24" fill="#c09090"/>
  <circle cx="259" cy="31" r="28" fill="#606060"/>
  <!-- white lower face -->
  <ellipse cx="272" cy="42" rx="16" ry="14" fill="#f0f0f0"/>
  <ellipse cx="276" cy="38" rx="14" ry="11" fill="#f0f0f0"/>
  <circle cx="250" cy="22" r="10" fill="white"/>
  <circle cx="250" cy="22" r="6.5" fill="#40c040" class="bl"/>
  <circle cx="250" cy="22" r="3" fill="#111" class="bl"/>
  <circle cx="247" cy="19" r="1.8" fill="white"/>
  <ellipse cx="274" cy="35" rx="4" ry="3" fill="#e07080"/>
  <path d="M271,37 Q268,41 266,40" stroke="#808080" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M277,37 Q280,41 282,40" stroke="#808080" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <line x1="265" y1="36" x2="298" y2="32" stroke="#606060" stroke-width="1.2" stroke-linecap="round" opacity=".6"/>
  <line x1="265" y1="39" x2="298" y2="39" stroke="#606060" stroke-width="1.2" stroke-linecap="round" opacity=".6"/>
</g>
</svg>
