<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" width="220" height="80" role="img" aria-label="cream loaf cat sitting">
<style>
.g{animation:bob 4s ease-in-out infinite}
.bl{animation:bl 5s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 50%}
.tw{animation:wag 3s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 0%}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes wag{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
@keyframes bl{0%,87%,100%{transform:scaleY(1)}91%{transform:scaleY(.05)}}
</style>
<g class="g">
  <!-- tail wrapping front, subtle sway -->
  <g class="tw">
    <path d="M24,64 Q14,52 16,40 Q18,30 28,32 Q36,34 34,44 Q32,54 40,62"
          stroke="#eedaa8" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M24,64 Q14,52 16,40 Q18,30 28,32 Q36,34 34,44 Q32,54 40,62"
          stroke="#b89862" stroke-width="4" fill="none" stroke-linecap="round" opacity=".4"/>
  </g>
  <!-- loaf body (layered ellipses for rounded blob) -->
  <ellipse cx="104" cy="58" rx="84" ry="20" fill="#eedaa8"/>
  <ellipse cx="104" cy="50" rx="72" ry="18" fill="#eedaa8"/>
  <ellipse cx="104" cy="44" rx="56" ry="14" fill="#eedaa8"/>
  <!-- belly lighter -->
  <ellipse cx="104" cy="62" rx="60" ry="12" fill="#f7e8c2"/>
  <!-- stripes -->
  <path d="M70,38 C71,48 71,58 70,68" stroke="#b89862" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M96,36 C97,48 97,60 96,70" stroke="#b89862" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M122,38 C123,48 123,58 122,66" stroke="#b89862" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- tiny paw stubs -->
  <ellipse cx="66" cy="76" rx="12" ry="6" fill="#eedaa8"/>
  <ellipse cx="142" cy="76" rx="12" ry="6" fill="#eedaa8"/>
  <!-- neck -->
  <ellipse cx="162" cy="50" rx="14" ry="18" fill="#eedaa8"/>
  <!-- ears -->
  <polygon points="172,36 177,18 192,34" fill="#eedaa8"/>
  <polygon points="174,35 178,23 190,34" fill="#f7c8a0"/>
  <polygon points="185,34 190,18 200,34" fill="#eedaa8"/>
  <polygon points="187,34 191,23 198,34" fill="#f7c8a0"/>
  <!-- head -->
  <circle cx="193" cy="42" r="26" fill="#eedaa8"/>
  <!-- snout -->
  <ellipse cx="209" cy="48" rx="13" ry="10" fill="#f7e8c2"/>
  <!-- eye -->
  <circle cx="185" cy="34" r="9.5" fill="white"/>
  <circle cx="185" cy="34" r="6" fill="#c89b3a" class="bl"/>
  <circle cx="185" cy="34" r="2.8" fill="#111" class="bl"/>
  <circle cx="182" cy="31" r="1.6" fill="white"/>
  <!-- nose -->
  <ellipse cx="207" cy="46" rx="4" ry="3" fill="#d07080"/>
  <!-- mouth -->
  <path d="M204,49 Q201,53 199,52" stroke="#906040" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M210,49 Q213,53 215,52" stroke="#906040" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- whiskers -->
  <line x1="198" y1="47" x2="219" y2="44" stroke="#b89862" stroke-width="1.1" stroke-linecap="round" opacity=".7"/>
  <line x1="198" y1="50" x2="219" y2="50" stroke="#b89862" stroke-width="1.1" stroke-linecap="round" opacity=".7"/>
</g>
</svg>
