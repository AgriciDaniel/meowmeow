<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" width="220" height="80" shape-rendering="crispEdges" role="img" aria-label="cream pixel-art loaf cat sitting with tail wrapped around">
  <g>
    <animateTransform attributeName="transform" type="translate"
                      values="0,0; 0,-1; 0,0"
                      calcMode="spline"
                      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
                      keyTimes="0;0.5;1" dur="4s" repeatCount="indefinite"/>
    <!-- tail wrapping around front -->
    <rect x="10" y="60" width="30" height="10" fill="#eedaa8"/>
    <rect x="10" y="50" width="10" height="16" fill="#eedaa8"/>
    <rect x="10" y="46" width="18" height="10" fill="#b89862"/>
    <!-- loaf body (round blob) -->
    <rect x="18"  y="38" width="130" height="34" fill="#eedaa8"/>
    <rect x="12"  y="44" width="12"  height="24" fill="#eedaa8"/>
    <rect x="142" y="42" width="12"  height="26" fill="#eedaa8"/>
    <rect x="26"  y="32" width="110" height="12" fill="#eedaa8"/>
    <rect x="36"  y="26" width="88"  height="12" fill="#eedaa8"/>
    <!-- belly lighter -->
    <rect x="28"  y="52" width="110" height="16" fill="#f7e8c2"/>
    <!-- stripes -->
    <rect x="40"  y="32" width="7" height="20" fill="#b89862"/>
    <rect x="62"  y="30" width="7" height="24" fill="#b89862"/>
    <rect x="86"  y="30" width="7" height="20" fill="#b89862"/>
    <rect x="108" y="32" width="7" height="16" fill="#b89862"/>
    <!-- tiny leg stubs at bottom -->
    <rect x="38"  y="68" width="18" height="10" fill="#eedaa8"/>
    <rect x="102" y="68" width="18" height="10" fill="#eedaa8"/>
    <!-- neck -->
    <rect x="148" y="36" width="16" height="26" fill="#eedaa8"/>
    <!-- head -->
    <rect x="158" y="14" width="54" height="52" fill="#eedaa8"/>
    <rect x="202" y="30" width="18" height="30" fill="#f7e8c2"/>
    <!-- ears -->
    <rect x="161" y="2"  width="16" height="14" fill="#eedaa8"/>
    <rect x="163" y="4"  width="10" height="9"  fill="#f7e8c2"/>
    <rect x="183" y="2"  width="16" height="14" fill="#eedaa8"/>
    <rect x="185" y="4"  width="10" height="9"  fill="#f7e8c2"/>
    <!-- eye -->
    <rect x="192" y="22" width="15" height="13" fill="#fafafa"/>
    <rect x="192" y="22" width="15" height="13" fill="#c89b3a">
      <animate attributeName="height" values="13;13;13;0;13" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1" keyTimes="0;0.82;0.9;0.93;1" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="22;22;22;28;22" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1" keyTimes="0;0.82;0.9;0.93;1" dur="5s" repeatCount="indefinite"/>
    </rect>
    <rect x="195" y="24" width="7" height="9" fill="#1a1a1a">
      <animate attributeName="height" values="9;9;9;0;9" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1" keyTimes="0;0.82;0.9;0.93;1" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="24;24;24;28;24" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1" keyTimes="0;0.82;0.9;0.93;1" dur="5s" repeatCount="indefinite"/>
    </rect>
    <rect x="193" y="23" width="5" height="4" fill="#fafafa"/>
    <rect x="210" y="38" width="8" height="6" fill="#d06060"/>
    <rect x="206" y="46" width="7" height="4" fill="#8b6820"/>
    <rect x="214" y="46" width="7" height="4" fill="#8b6820"/>
    <g stroke="#8b6820" stroke-width="1.5" stroke-linecap="square" fill="none">
      <line x1="212" y1="40" x2="219" y2="37"/>
      <line x1="212" y1="44" x2="219" y2="47"/>
    </g>
  </g>
</svg>
