<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <style>
    .segment { animation: undulate 1.2s ease-in-out infinite; }
    @keyframes undulate { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    .s1 { animation-delay: 0s; } .s2 { animation-delay: 0.15s; } .s3 { animation-delay: 0.3s; } .s4 { animation-delay: 0.45s; }
    .leg { animation: run 0.4s ease-in-out infinite alternate; transform-origin: 50% 0%; }
    @keyframes run { from { transform: rotate(-20deg); } to { transform: rotate(20deg); } }
    .lf { animation-delay: 0s; } .lb { animation-delay: 0.2s; }
    .tail { animation: swish 0.8s ease-in-out infinite alternate; transform-origin: 100% 50%; }
    @keyframes swish { from { transform: rotate(-15deg); } to { transform: rotate(15deg); } }
    .head { animation: bob 1.2s ease-in-out infinite; animation-delay: 0.6s; }
    @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    .neon { stroke: #00ffff; filter: url(#glow); animation: pulse 1s infinite alternate; }
    @keyframes pulse { from { opacity: 0.7; } to { opacity: 1; } }
  </style>
  <g transform="translate(50, 50)">
    <path class="tail neon" d="M0 50 Q-30 50 -30 20" stroke-width="8" fill="none" stroke-linecap="round" />
    <rect class="leg lb neon" x="30" y="80" width="10" height="20" rx="5" fill="none" stroke-width="2" />
    <rect class="leg lb neon" x="110" y="80" width="10" height="20" rx="5" fill="none" stroke-width="2" />
    <rect class="segment s4 neon" x="20" y="30" width="45" height="70" rx="15" fill="none" stroke-width="3" />
    <rect class="segment s3 neon" x="60" y="30" width="45" height="70" rx="15" fill="none" stroke-width="3" />
    <rect class="segment s2 neon" x="100" y="30" width="45" height="70" rx="15" fill="none" stroke-width="3" />
    <rect class="segment s1 neon" x="140" y="30" width="45" height="70" rx="15" fill="none" stroke-width="3" />
    <rect class="leg lf neon" x="150" y="80" width="10" height="20" rx="5" fill="none" stroke-width="2" />
    <rect class="leg lf neon" x="200" y="80" width="10" height="20" rx="5" fill="none" stroke-width="2" />
    <g class="head" transform="translate(180, 20)">
      <rect x="0" y="0" width="60" height="55" rx="20" fill="none" class="neon" stroke-width="3" />
      <path d="M10 0 L0 -15 L25 5 Z" fill="none" class="neon" stroke-width="2" />
      <path d="M50 0 L60 -15 L35 5 Z" fill="none" class="neon" stroke-width="2" />
      <circle cx="15" cy="25" r="4" class="neon" fill="#00ffff"/><circle cx="45" cy="25" r="4" class="neon" fill="#00ffff"/>
      <path d="M25 40 Q30 45 35 40" class="neon" fill="none" stroke-width="2" stroke-linecap="round" />
    </g>
  </g>
</svg>