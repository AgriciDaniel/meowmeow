<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="200" shape-rendering="crispEdges" role="img" aria-label="zooming orange pixel-art tabby cat">
  <style>
    @keyframes zoom { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }
    .zoom { transform-origin: 100px 90px; animation: zoom 3s ease-in-out infinite; }
    @keyframes blink-h { 0%,67%,100% { height: 30px; } 73% { height: 0; } }
    @keyframes blink-y { 0%,67%,100% { y: 70px; } 73% { y: 85px; } }
    @keyframes blinkp-h { 0%,67%,100% { height: 15px; } 73% { height: 0; } }
    @keyframes blinkp-y { 0%,67%,100% { y: 80px; } 73% { y: 87px; } }
    .iris { animation: blink-h 4.5s ease-in-out infinite, blink-y 4.5s ease-in-out infinite; }
    .pupil { animation: blinkp-h 4.5s ease-in-out infinite, blinkp-y 4.5s ease-in-out infinite; }
  </style>
  <g class="zoom">
    <rect x="30" y="10" width="10" height="10" fill="#e89b5a"/>
    <rect x="40" y="10" width="10" height="10" fill="#e89b5a"/>
    <rect x="20" y="20" width="40" height="10" fill="#e89b5a"/>
    <rect x="10" y="30" width="60" height="10" fill="#e89b5a"/>
    <rect x="30" y="20" width="10" height="10" fill="#f4b078"/>
    <rect x="30" y="30" width="20" height="10" fill="#f4b078"/>
    <rect x="150" y="10" width="10" height="10" fill="#e89b5a"/>
    <rect x="160" y="10" width="10" height="10" fill="#e89b5a"/>
    <rect x="140" y="20" width="40" height="10" fill="#e89b5a"/>
    <rect x="130" y="30" width="60" height="10" fill="#e89b5a"/>
    <rect x="160" y="20" width="10" height="10" fill="#f4b078"/>
    <rect x="150" y="30" width="20" height="10" fill="#f4b078"/>
    <rect x="10"  y="40" width="180" height="80" fill="#e89b5a"/>
    <rect x="0"   y="50" width="10"  height="60" fill="#e89b5a"/>
    <rect x="190" y="50" width="10"  height="60" fill="#e89b5a"/>
    <rect x="20"  y="120" width="160" height="10" fill="#e89b5a"/>
    <rect x="30"  y="130" width="140" height="10" fill="#e89b5a"/>
    <rect x="40"  y="140" width="120" height="10" fill="#e89b5a"/>
    <rect x="30"  y="40" width="10" height="10" fill="#c27a3a"/>
    <rect x="20"  y="50" width="10" height="10" fill="#c27a3a"/>
    <rect x="10"  y="60" width="10" height="10" fill="#c27a3a"/>
    <rect x="30"  y="70" width="10" height="10" fill="#c27a3a"/>
    <rect x="40"  y="80" width="10" height="10" fill="#c27a3a"/>
    <rect x="20"  y="90" width="10" height="10" fill="#c27a3a"/>
    <rect x="170" y="40" width="10" height="10" fill="#c27a3a"/>
    <rect x="180" y="50" width="10" height="10" fill="#c27a3a"/>
    <rect x="170" y="70" width="10" height="10" fill="#c27a3a"/>
    <rect x="160" y="80" width="10" height="10" fill="#c27a3a"/>
    <rect x="180" y="90" width="10" height="10" fill="#c27a3a"/>
    <rect x="50"  y="70" width="20" height="30" fill="#fafafa"/>
    <rect x="130" y="70" width="20" height="30" fill="#fafafa"/>
    <rect class="iris" x="50" y="70" width="20" height="30" fill="#3a7c3a"/>
    <rect class="iris" x="130" y="70" width="20" height="30" fill="#3a7c3a"/>
    <rect class="pupil" x="55" y="80" width="10" height="15" fill="#1a1a1a"/>
    <rect class="pupil" x="135" y="80" width="10" height="15" fill="#1a1a1a"/>
    <rect x="55" y="73" width="5" height="5" fill="#fafafa"/>
    <rect x="135" y="73" width="5" height="5" fill="#fafafa"/>
    <rect x="90" y="108" width="20" height="10" fill="#c06060"/>
    <rect x="95" y="118" width="10" height="10" fill="#c06060"/>
    <rect x="85"  y="135" width="10" height="5" fill="#6b3a1a"/>
    <rect x="105" y="135" width="10" height="5" fill="#6b3a1a"/>
    <g stroke="#6b3a1a" stroke-width="2" stroke-linecap="square" fill="none">
      <line x1="10"  y1="110" x2="70"  y2="110"/>
      <line x1="10"  y1="120" x2="70"  y2="117"/>
      <line x1="130" y1="110" x2="190" y2="110"/>
      <line x1="130" y1="117" x2="190" y2="120"/>
    </g>
  </g>
</svg>
