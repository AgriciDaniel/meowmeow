<?xml version="1.0" ?>
<!-- Style B: Spooky Pulse — dark body shifts to deep navy, ears flash hot pink, eyes flicker -->
<svg width="800px" height="800px" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- right arm/paw -->
  <path d="M19.5,22H14a1,1,0,0,1-1-1V20a1,1,0,0,1,1-1h5.5A1.5,1.5,0,0,1,21,20.5h0A1.5,1.5,0,0,1,19.5,22Z">
    <animate attributeName="fill" values="#4b5661;#18243e;#4b5661"
      keyTimes="0;0.5;1" dur="2.4s" repeatCount="indefinite"/>
  </path>
  <!-- body -->
  <path d="M11,10h6a0,0,0,0,1,0,0V22a0,0,0,0,1,0,0H8a4,4,0,0,1-4-4V17A7,7,0,0,1,11,10Z">
    <animate attributeName="fill" values="#4b5661;#18243e;#4b5661"
      keyTimes="0;0.5;1" dur="2.4s" repeatCount="indefinite"/>
  </path>
  <!-- left toe (white — stays white) -->
  <path d="M12,22h0a1,1,0,0,1-1-1V20h2v1A1,1,0,0,1,12,22Z" fill="#fff"/>
  <!-- right toe (white — stays white) -->
  <path d="M16,22h0a1,1,0,0,1-1-1V20h2v1A1,1,0,0,1,16,22Z" fill="#fff"/>
  <!-- white belly -->
  <path d="M14,14h0a2.99994,2.99994,0,0,1-3-3V9h6v2A2.99994,2.99994,0,0,1,14,14Z" fill="#fff"/>
  <!-- left ear -->
  <path d="M13,4,10,6V2.2071a.5.5,0,0,1,.8536-.3535Z">
    <animate attributeName="fill" values="#ff888b;#ff1a44;#ffaacc;#ff888b"
      keyTimes="0;0.33;0.66;1" dur="2.4s" repeatCount="indefinite"/>
  </path>
  <!-- right ear -->
  <path d="M15,4l3,2V2.2071a.5.5,0,0,0-.8536-.3535Z">
    <animate attributeName="fill" values="#ff888b;#ff1a44;#ffaacc;#ff888b"
      keyTimes="0;0.33;0.66;1" dur="2.4s" repeatCount="indefinite"/>
  </path>
  <!-- head -->
  <path d="M14,11h0a4,4,0,0,1-4-4V4h8V7A4.00005,4.00005,0,0,1,14,11Z">
    <animate attributeName="fill" values="#4b5661;#18243e;#4b5661"
      keyTimes="0;0.5;1" dur="2.4s" repeatCount="indefinite"/>
  </path>
  <!-- left eye -->
  <circle cx="12.25" cy="6.75" r="0.75" fill="#fff">
    <animate attributeName="opacity" values="1;1;0.08;1;1"
      keyTimes="0;0.46;0.5;0.54;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <!-- right eye -->
  <circle cx="16" cy="6.75" r="0.75" fill="#fff">
    <animate attributeName="opacity" values="1;1;0.08;1;1"
      keyTimes="0;0.46;0.5;0.54;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
