<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="80" shape-rendering="crispEdges"
     role="img" aria-label="pixel-art cat morphing between orange tabby, gray tabby, cream, and blue-gray">
  <g>
    <animateTransform attributeName="transform" type="translate"
                      values="0 0; 0 -1; 0 0"
                      calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
                      keyTimes="0;0.5;1" dur="3.2s" repeatCount="indefinite"/>

    <!-- left ear -->
    <rect x="30" y="10" width="10" height="10" fill="#f0a030"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#f0a030;#f0a030;#b0b0b0;#b0b0b0;#eedaa8;#eedaa8;#8898a8;#8898a8;#f0a030" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="40" y="10" width="10" height="10" fill="#f0a030"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#f0a030;#f0a030;#b0b0b0;#b0b0b0;#eedaa8;#eedaa8;#8898a8;#8898a8;#f0a030" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="20" y="20" width="40" height="10" fill="#f0a030"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#f0a030;#f0a030;#b0b0b0;#b0b0b0;#eedaa8;#eedaa8;#8898a8;#8898a8;#f0a030" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="10" y="30" width="60" height="10" fill="#f0a030"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#f0a030;#f0a030;#b0b0b0;#b0b0b0;#eedaa8;#eedaa8;#8898a8;#8898a8;#f0a030" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="30" y="20" width="10" height="10" fill="#ffc060"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#ffc060;#ffc060;#d0d0d0;#d0d0d0;#f7e8c2;#f7e8c2;#a8b8c8;#a8b8c8;#ffc060" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="30" y="30" width="20" height="10" fill="#ffc060"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#ffc060;#ffc060;#d0d0d0;#d0d0d0;#f7e8c2;#f7e8c2;#a8b8c8;#a8b8c8;#ffc060" dur="12s" repeatCount="indefinite"/></rect>

    <!-- right ear -->
    <rect x="150" y="10" width="10" height="10" fill="#f0a030"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#f0a030;#f0a030;#b0b0b0;#b0b0b0;#eedaa8;#eedaa8;#8898a8;#8898a8;#f0a030" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="160" y="10" width="10" height="10" fill="#f0a030"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#f0a030;#f0a030;#b0b0b0;#b0b0b0;#eedaa8;#eedaa8;#8898a8;#8898a8;#f0a030" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="140" y="20" width="40" height="10" fill="#f0a030"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#f0a030;#f0a030;#b0b0b0;#b0b0b0;#eedaa8;#eedaa8;#8898a8;#8898a8;#f0a030" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="130" y="30" width="60" height="10" fill="#f0a030"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#f0a030;#f0a030;#b0b0b0;#b0b0b0;#eedaa8;#eedaa8;#8898a8;#8898a8;#f0a030" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="160" y="20" width="10" height="10" fill="#ffc060"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#ffc060;#ffc060;#d0d0d0;#d0d0d0;#f7e8c2;#f7e8c2;#a8b8c8;#a8b8c8;#ffc060" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="150" y="30" width="20" height="10" fill="#ffc060"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#ffc060;#ffc060;#d0d0d0;#d0d0d0;#f7e8c2;#f7e8c2;#a8b8c8;#a8b8c8;#ffc060" dur="12s" repeatCount="indefinite"/></rect>

    <!-- main face -->
    <rect x="10"  y="40" width="180" height="80" fill="#f0a030"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#f0a030;#f0a030;#b0b0b0;#b0b0b0;#eedaa8;#eedaa8;#8898a8;#8898a8;#f0a030" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="0"   y="50" width="10"  height="60" fill="#f0a030"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#f0a030;#f0a030;#b0b0b0;#b0b0b0;#eedaa8;#eedaa8;#8898a8;#8898a8;#f0a030" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="190" y="50" width="10"  height="60" fill="#f0a030"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#f0a030;#f0a030;#b0b0b0;#b0b0b0;#eedaa8;#eedaa8;#8898a8;#8898a8;#f0a030" dur="12s" repeatCount="indefinite"/></rect>

    <!-- chin -->
    <rect x="20"  y="120" width="160" height="10" fill="#f0a030"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#f0a030;#f0a030;#b0b0b0;#b0b0b0;#eedaa8;#eedaa8;#8898a8;#8898a8;#f0a030" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="30"  y="130" width="140" height="10" fill="#f0a030"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#f0a030;#f0a030;#b0b0b0;#b0b0b0;#eedaa8;#eedaa8;#8898a8;#8898a8;#f0a030" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="40"  y="140" width="120" height="10" fill="#f0a030"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#f0a030;#f0a030;#b0b0b0;#b0b0b0;#eedaa8;#eedaa8;#8898a8;#8898a8;#f0a030" dur="12s" repeatCount="indefinite"/></rect>

    <!-- dark stripes left -->
    <rect x="30" y="40" width="10" height="10" fill="#c07818"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#c07818;#c07818;#707070;#707070;#b89862;#b89862;#687888;#687888;#c07818" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="20" y="50" width="10" height="10" fill="#c07818"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#c07818;#c07818;#707070;#707070;#b89862;#b89862;#687888;#687888;#c07818" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="10" y="60" width="10" height="10" fill="#c07818"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#c07818;#c07818;#707070;#707070;#b89862;#b89862;#687888;#687888;#c07818" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="30" y="70" width="10" height="10" fill="#c07818"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#c07818;#c07818;#707070;#707070;#b89862;#b89862;#687888;#687888;#c07818" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="40" y="80" width="10" height="10" fill="#c07818"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#c07818;#c07818;#707070;#707070;#b89862;#b89862;#687888;#687888;#c07818" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="20" y="90" width="10" height="10" fill="#c07818"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#c07818;#c07818;#707070;#707070;#b89862;#b89862;#687888;#687888;#c07818" dur="12s" repeatCount="indefinite"/></rect>
    <!-- dark stripes right -->
    <rect x="170" y="40" width="10" height="10" fill="#c07818"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#c07818;#c07818;#707070;#707070;#b89862;#b89862;#687888;#687888;#c07818" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="180" y="50" width="10" height="10" fill="#c07818"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#c07818;#c07818;#707070;#707070;#b89862;#b89862;#687888;#687888;#c07818" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="170" y="70" width="10" height="10" fill="#c07818"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#c07818;#c07818;#707070;#707070;#b89862;#b89862;#687888;#687888;#c07818" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="160" y="80" width="10" height="10" fill="#c07818"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#c07818;#c07818;#707070;#707070;#b89862;#b89862;#687888;#687888;#c07818" dur="12s" repeatCount="indefinite"/></rect>
    <rect x="180" y="90" width="10" height="10" fill="#c07818"><animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#c07818;#c07818;#707070;#707070;#b89862;#b89862;#687888;#687888;#c07818" dur="12s" repeatCount="indefinite"/></rect>

    <!-- eye whites -->
    <rect x="50"  y="70" width="20" height="30" fill="#fafafa"/>
    <rect x="130" y="70" width="20" height="30" fill="#fafafa"/>

    <!-- left iris + blink -->
    <rect x="50" y="70" width="20" height="30" fill="#3a9c3a">
      <animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#3a9c3a;#3a9c3a;#4a8ac0;#4a8ac0;#c89b3a;#c89b3a;#30b8a0;#30b8a0;#3a9c3a" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="height" values="30;30;30;30;0;30" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1" keyTimes="0;0.3;0.7;0.9;0.93;1" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="70;70;70;70;85;70" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1" keyTimes="0;0.3;0.7;0.9;0.93;1" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <!-- right iris + blink -->
    <rect x="130" y="70" width="20" height="30" fill="#3a9c3a">
      <animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#3a9c3a;#3a9c3a;#4a8ac0;#4a8ac0;#c89b3a;#c89b3a;#30b8a0;#30b8a0;#3a9c3a" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="height" values="30;30;30;30;0;30" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1" keyTimes="0;0.3;0.7;0.9;0.93;1" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="70;70;70;70;85;70" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1" keyTimes="0;0.3;0.7;0.9;0.93;1" dur="4.5s" repeatCount="indefinite"/>
    </rect>

    <!-- left pupil -->
    <rect x="55" y="80" width="10" height="15" fill="#1a1a1a">
      <animate attributeName="height" values="15;15;15;15;0;15" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1" keyTimes="0;0.3;0.7;0.9;0.93;1" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="80;80;80;80;87;80" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1" keyTimes="0;0.3;0.7;0.9;0.93;1" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <!-- right pupil -->
    <rect x="135" y="80" width="10" height="15" fill="#1a1a1a">
      <animate attributeName="height" values="15;15;15;15;0;15" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1" keyTimes="0;0.3;0.7;0.9;0.93;1" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="80;80;80;80;87;80" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1" keyTimes="0;0.3;0.7;0.9;0.93;1" dur="4.5s" repeatCount="indefinite"/>
    </rect>

    <!-- eye highlights -->
    <rect x="55"  y="73" width="5" height="5" fill="#fafafa"/>
    <rect x="135" y="73" width="5" height="5" fill="#fafafa"/>

    <!-- nose -->
    <rect x="90" y="108" width="20" height="10" fill="#c06060">
      <animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#c06060;#c06060;#b88080;#b88080;#c06060;#c06060;#b87878;#b87878;#c06060" dur="12s" repeatCount="indefinite"/>
    </rect>
    <rect x="95" y="118" width="10" height="10" fill="#c06060">
      <animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#c06060;#c06060;#b88080;#b88080;#c06060;#c06060;#b87878;#b87878;#c06060" dur="12s" repeatCount="indefinite"/>
    </rect>

    <!-- mouth marks -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
                        values="0 100 120; 0 100 120; -3 100 120; 0 100 120"
                        calcMode="spline" keySplines="0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1"
                        keyTimes="0;0.9;0.93;1" dur="4.5s" repeatCount="indefinite"/>
      <rect x="85"  y="135" width="10" height="5" fill="#804018">
        <animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#804018;#804018;#4a4a4a;#4a4a4a;#6b3a1a;#6b3a1a;#506878;#506878;#804018" dur="12s" repeatCount="indefinite"/>
      </rect>
      <rect x="105" y="135" width="10" height="5" fill="#804018">
        <animate attributeName="fill" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#804018;#804018;#4a4a4a;#4a4a4a;#6b3a1a;#6b3a1a;#506878;#506878;#804018" dur="12s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- whiskers -->
    <g stroke="#804018" stroke-width="2" stroke-linecap="square" fill="none">
      <animateTransform attributeName="transform" type="rotate"
                        values="0 100 115; 0 100 115; 0 100 115; -2 100 115; 2 100 115; 0 100 115"
                        calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.12 0 0.39 0; 0.61 1 0.88 1; 0.42 0 0.58 1"
                        keyTimes="0;0.85;0.9;0.93;0.96;1" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="stroke" keyTimes="0;0.167;0.25;0.417;0.5;0.667;0.75;0.917;1" values="#804018;#804018;#4a4a4a;#4a4a4a;#6b3a1a;#6b3a1a;#506878;#506878;#804018" dur="12s" repeatCount="indefinite"/>
      <line x1="10"  y1="110" x2="70"  y2="110"/>
      <line x1="10"  y1="120" x2="70"  y2="117"/>
      <line x1="130" y1="110" x2="190" y2="110"/>
      <line x1="130" y1="117" x2="190" y2="120"/>
    </g>
  </g>
</svg>
