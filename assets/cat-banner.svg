<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="100%" role="img" aria-label="a black cat chases a butterfly across a field, tail streaming, grass swaying">
