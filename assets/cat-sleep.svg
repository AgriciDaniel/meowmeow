<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 180" width="280" role="img" aria-label="an orange tabby cat sleeping, dreaming of a fish, with a tiny mouse tiptoeing past its twitching ear">
  <circle cx="95" cy="62" r="3" fill="#fff" stroke="#bbb" stroke-width="1" opacity="0.75"/>
  <circle cx="107" cy="48" r="5" fill="#fff" stroke="#bbb" stroke-width="1" opacity="0.8"/>
  <ellipse cx="155" cy="30" rx="55" ry="18" fill="#fff" stroke="#bbb" stroke-width="1.5"/>

  <g>
    <animateMotion dur="5s" repeatCount="indefinite"
                   path="M 115 30 Q 155 20 195 30 Q 155 40 115 30"/>
    <g>
      <ellipse cx="0" cy="0" rx="9" ry="4.5" fill="#5ab5d4"/>
      <polygon points="-9,0 -15,-5 -15,5" fill="#5ab5d4">
        <animateTransform attributeName="transform" type="skewX" values="0;12;0;-12;0" dur="0.6s" repeatCount="indefinite"/>
      </polygon>
      <circle cx="5" cy="-1" r="1.2" fill="#fff"/>
      <circle cx="5" cy="-1" r="0.5" fill="#000"/>
      <path d="M 3 3 Q 4 4 6 3" stroke="#246578" stroke-width="0.4" fill="none"/>
    </g>
  </g>

  <g>
    <ellipse cx="145" cy="120" rx="80" ry="30" fill="#e89b5a">
      <animate attributeName="ry" values="30;33;30" dur="3.8s" repeatCount="indefinite"/>
    </ellipse>

    <circle cx="78" cy="110" r="23" fill="#e89b5a">
      <animate attributeName="r" values="23;23.8;23" dur="3.8s" repeatCount="indefinite"/>
    </circle>

    <polygon points="60,96 57,76 71,90" fill="#e89b5a">
      <animateTransform attributeName="transform" type="rotate"
                        values="0 60 96; 0 60 96; 0 60 96; -18 60 96; 3 60 96; -18 60 96; 0 60 96; 0 60 96"
                        keyTimes="0;0.35;0.42;0.48;0.53;0.58;0.65;1"
                        dur="10s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="88,90 95,72 85,84" fill="#e89b5a"/>
    <polygon points="62,93 61,84 68,90" fill="#d4a5a5"/>

    <path d="M 70 108 Q 74 110 78 108" stroke="#4a2a0d" stroke-width="1.5" fill="none"/>
    <path d="M 58 108 Q 60 109 62 108" stroke="#4a2a0d" stroke-width="1"/>
    <circle cx="58" cy="114" r="1.6" fill="#d4a5a5"/>
    <line x1="46" y1="115" x2="60" y2="114" stroke="#4a2a0d" stroke-width="0.6"/>
    <line x1="46" y1="120" x2="60" y2="117" stroke="#4a2a0d" stroke-width="0.6"/>

    <ellipse cx="108" cy="146" rx="8" ry="4.5" fill="#e89b5a">
      <animate attributeName="cy" values="146;145;146;146;146;144;146;146" keyTimes="0;0.1;0.2;0.3;0.55;0.6;0.7;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="108;110;108;108;108;106;108;108" keyTimes="0;0.1;0.2;0.3;0.55;0.6;0.7;1" dur="6s" repeatCount="indefinite"/>
    </ellipse>

    <path d="M 215 118 Q 234 100 216 84 Q 198 72 188 92" stroke="#e89b5a" stroke-width="15" fill="none" stroke-linecap="round"/>
    <path d="M 215 118 Q 232 104 218 92" stroke="#c27a3a" stroke-width="1.2" fill="none"/>

    <path d="M 118 102 Q 122 110 118 118" stroke="#c27a3a" stroke-width="2" fill="none"/>
    <path d="M 155 98 Q 160 110 155 121" stroke="#c27a3a" stroke-width="2" fill="none"/>
    <path d="M 188 102 Q 193 112 188 122" stroke="#c27a3a" stroke-width="2" fill="none"/>
  </g>

  <g>
    <animateTransform attributeName="transform" type="translate"
                      values="330 0; -70 0" dur="10s" repeatCount="indefinite"/>
    <g>
      <animateTransform attributeName="transform" type="translate"
                        values="0 0; 0 -1.5; 0 0" dur="0.3s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="162" rx="11" ry="6" fill="#aaa"/>
      <circle cx="-11" cy="160" r="5.5" fill="#aaa"/>
      <circle cx="-14" cy="155" r="3" fill="#aaa"/>
      <circle cx="-14" cy="155" r="1.5" fill="#d4a5a5"/>
      <circle cx="-14" cy="160" r="0.7" fill="#000"/>
      <circle cx="-16" cy="162" r="0.6" fill="#333"/>
      <line x1="-16" y1="162" x2="-20" y2="160" stroke="#555" stroke-width="0.3"/>
      <line x1="-16" y1="162" x2="-20" y2="164" stroke="#555" stroke-width="0.3"/>
      <path d="M 9 162 Q 20 158 24 152 Q 25 148 22 146" stroke="#aaa" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <ellipse cx="-5" cy="168" rx="2" ry="1" fill="#888"/>
      <ellipse cx="4" cy="168" rx="2" ry="1" fill="#888"/>
    </g>
  </g>

  <g font-family="Georgia, serif" font-weight="bold" fill="#666">
    <text x="110" y="80" font-size="14">z
      <animate attributeName="y" values="80;42" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0" dur="3.5s" repeatCount="indefinite"/>
    </text>
    <text x="128" y="65" font-size="18">Z
      <animate attributeName="y" values="65;22" dur="3.5s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0" dur="3.5s" begin="1.2s" repeatCount="indefinite"/>
    </text>
    <text x="100" y="54" font-size="22">Z
      <animate attributeName="y" values="54;14" dur="3.5s" begin="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0" dur="3.5s" begin="2.4s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>
