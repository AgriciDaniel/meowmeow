      <ellipse cx="22" cy="32" rx="18" ry="7" fill="#9a9a9a"/>
      <circle cx="40" cy="25" r="8" fill="#9a9a9a"/>
      <polygon points="34,18 32,10 38,17" fill="#9a9a9a"/>
      <polygon points="46,18 48,10 42,17" fill="#9a9a9a"/>
      <circle cx="38" cy="24" r="0.9" fill="#1a1a1a"/>
