<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="280" role="img" aria-label="a cream tabby cat sleeping in loaf position, dreaming of a fish, with a tiny mouse tiptoeing past its twitching ear">

  <circle cx="92" cy="72" r="3" fill="#fff" stroke="#bbb" stroke-width="1" opacity="0.75"/>
  <circle cx="104" cy="58" r="5" fill="#fff" stroke="#bbb" stroke-width="1" opacity="0.8"/>
  <ellipse cx="155" cy="40" rx="55" ry="18" fill="#fff" stroke="#bbb" stroke-width="1.5"/>

  <g>
    <animateMotion dur="5s" repeatCount="indefinite"
                   path="M 115 40 Q 155 30 195 40 Q 155 50 115 40"/>
    <g>
      <ellipse cx="0" cy="0" rx="9" ry="4.5" fill="#5ab5d4"/>
      <polygon points="-9,0 -15,-5 -15,5" fill="#5ab5d4">
        <animateTransform attributeName="transform" type="skewX" values="0;12;0;-12;0" dur="0.6s" repeatCount="indefinite"/>
      </polygon>
      <circle cx="5" cy="-1" r="1.2" fill="#fff"/>
      <circle cx="5" cy="-1" r="0.5" fill="#000"/>
    </g>
  </g>

  <g>
    <path d="M 80 145 Q 70 110 90 100 Q 105 90 140 92 Q 180 92 200 105 Q 215 115 210 145 Z" fill="#e8d4a8">
      <animate attributeName="d"
               values="M 80 145 Q 70 110 90 100 Q 105 90 140 92 Q 180 92 200 105 Q 215 115 210 145 Z;
                       M 80 145 Q 70 108 90 98 Q 105 88 140 90 Q 180 90 200 103 Q 215 113 210 145 Z;
                       M 80 145 Q 70 110 90 100 Q 105 90 140 92 Q 180 92 200 105 Q 215 115 210 145 Z"
               dur="3.8s" repeatCount="indefinite"/>
    </path>

    <ellipse cx="145" cy="145" rx="65" ry="8" fill="#d4b88c"/>

    <circle cx="88" cy="115" r="22" fill="#e8d4a8">
      <animate attributeName="r" values="22;22.8;22" dur="3.8s" repeatCount="indefinite"/>
    </circle>

    <polygon points="72,100 68,80 83,94" fill="#e8d4a8">
      <animateTransform attributeName="transform" type="rotate"
                        values="0 72 100; 0 72 100; 0 72 100; -18 72 100; 4 72 100; -18 72 100; 0 72 100; 0 72 100"
                        keyTimes="0;0.35;0.42;0.48;0.53;0.58;0.65;1"
                        dur="10s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="100,94 107,74 95,88" fill="#e8d4a8"/>
    <polygon points="74,97 73,88 80,93" fill="#d4a5a5"/>

    <path d="M 79 113 Q 83 115 87 113" stroke="#8b6a3c" stroke-width="1.5" fill="none"/>
    <path d="M 68 113 Q 70 114 72 113" stroke="#8b6a3c" stroke-width="1"/>
    <circle cx="67" cy="119" r="1.6" fill="#d4a5a5"/>
    <line x1="55" y1="120" x2="69" y2="119" stroke="#8b6a3c" stroke-width="0.6"/>
    <line x1="55" y1="125" x2="69" y2="122" stroke="#8b6a3c" stroke-width="0.6"/>

    <path d="M 108 108 Q 112 120 108 130" stroke="#c4a478" stroke-width="1.8" fill="none"/>
    <path d="M 140 102 Q 145 118 140 135" stroke="#c4a478" stroke-width="1.8" fill="none"/>
    <path d="M 172 108 Q 177 122 172 138" stroke="#c4a478" stroke-width="1.8" fill="none"/>
    <path d="M 195 118 Q 198 128 195 140" stroke="#c4a478" stroke-width="1.8" fill="none"/>
  </g>

  <g>
    <animateTransform attributeName="transform" type="translate"
                      values="340 0; -80 0" dur="10s" repeatCount="indefinite"/>
    <g>
      <animateTransform attributeName="transform" type="translate"
                        values="0 0; 0 -1.5; 0 0" dur="0.3s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="172" rx="11" ry="6" fill="#aaa"/>
      <circle cx="-11" cy="170" r="5.5" fill="#aaa"/>
      <circle cx="-14" cy="165" r="3" fill="#aaa"/>
      <circle cx="-14" cy="165" r="1.5" fill="#d4a5a5"/>
      <circle cx="-14" cy="170" r="0.7" fill="#000"/>
      <circle cx="-16" cy="172" r="0.6" fill="#333"/>
      <line x1="-16" y1="172" x2="-20" y2="170" stroke="#555" stroke-width="0.3"/>
      <line x1="-16" y1="172" x2="-20" y2="174" stroke="#555" stroke-width="0.3"/>
      <path d="M 9 172 Q 20 168 24 162 Q 25 158 22 156" stroke="#aaa" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <ellipse cx="-5" cy="178" rx="2" ry="1" fill="#888"/>
      <ellipse cx="4" cy="178" rx="2" ry="1" fill="#888"/>
    </g>
  </g>

  <g font-family="Georgia, serif" font-weight="bold" fill="#888">
    <text x="108" y="88" font-size="14">z
      <animate attributeName="y" values="88;50" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0" dur="3.5s" repeatCount="indefinite"/>
    </text>
    <text x="126" y="72" font-size="18">Z
      <animate attributeName="y" values="72;30" dur="3.5s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0" dur="3.5s" begin="1.2s" repeatCount="indefinite"/>
    </text>
    <text x="98" y="62" font-size="22">Z
      <animate attributeName="y" values="62;22" dur="3.5s" begin="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0" dur="3.5s" begin="2.4s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>
